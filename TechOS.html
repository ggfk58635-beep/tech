<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TechOS 2.2.0 (Kernel & Isolation Update)</title>
    <style>body, html { margin:0; padding:0; height:100%; background:#000; overflow:hidden; touch-action:none; user-select:none; -webkit-user-select:none; }</style>
</head>
<body>
<canvas id="os-surface"></canvas>
<script>
/**
 * [VFS 2.5] - 高容量虚拟文件系统
 */
const VFS = {
    disk: JSON.parse(localStorage.getItem('techos_apps')) || {},
    saveApp: (id, appData) => { VFS.disk[id] = appData; localStorage.setItem('techos_apps', JSON.stringify(VFS.disk)); Layout.sync(); },
    removeApp: (id) => { delete VFS.disk[id]; localStorage.setItem('techos_apps', JSON.stringify(VFS.disk)); Layout.sync(); },
    isInstalled: (id) => !!VFS.disk[id] || id.startsWith('sys_')
};

const SysApps = {
    'sys_store': { name: "商店", icon: "STO" },
    'sys_imp': { name: "导入", icon: "IMP" }
};

const CloudStore = {
    'app_winmgr': {
        name: "窗口管理", icon: "MGR",
        logic: `
            UI.text("后台进程调度中心", wx+15, wy+50, 14, '#00FF9C');
            if (State.bgWins.length === 0) {
                UI.text("无挂起的后台应用", wx+ww/2, wy+wh/2, 12, '#555', 'center');
            } else {
                let cy = 70;
                [...State.bgWins].forEach((id, idx) => {
                    let appName = SysApps[id] ? SysApps[id].name : (VFS.disk[id] ? VFS.disk[id].name : id);
                    UI.rect(wx+15, wy+cy, ww-30, 45, '#00FF9C');
                    UI.text(appName, wx+25, wy+cy+26, 14, '#00FF9C');
                    UI.regBtn(wx+ww-140, wy+cy+10, 55, 25, () => {
                        State.bgWins = State.bgWins.filter(w => w !== id);
                        if(!State.winStack.includes(id)) State.winStack.unshift(id); 
                    }, "显示");
                    UI.regBtn(wx+ww-75, wy+cy+10, 55, 25, () => {
                        State.bgWins = State.bgWins.filter(w => w !== id);
                        State.winStack = State.winStack.filter(w => w !== id);
                        delete window.AppState[id];
                    }, "杀后台");
                    cy += 55;
                });
            }
        `
    },
    'app_settings': {
        name: "系统内核", icon: "KER",
        logic: `
            UI.text("TechOS Kernel", wx+ww/2, wy+60, 26, '#00FF9C', 'center');
            UI.text("Version 2.2.0 (Perf & Shield)", wx+ww/2, wy+85, 11, '#00FF9C', 'center');
            UI.rect(wx+20, wy+105, ww-40, 1, '#00FF9C', true);
            let info = [
                "CPU调控: 黑阈级进程冻结机制已开启",
                "内存清理: 幽灵内存清浊释放守护中",
                "UI渲染: Z轴严格穿透隔离生效中",
                "VFS: 无尽文本 DOM 桥接模式已激活"
            ];
            info.forEach((txt, i) => { UI.text(txt, wx+25, wy+135 + i*25, 12, '#00FF9C'); });
            UI.text("Sys Ticks: " + OS_Kernel.ticks, wx+25, wy+250, 10, '#555');
        `
    }
};

window.AppState = {}; 
const State = {
    winStack: [],        
    bgWins: [],          
    openFolder: null,    
    lastClickTime: 0,
    contextMenu: null,   
    longPressTimer: null,
    drag: { active: false, item: null, startX: 0, startY: 0, currX: 0, currY: 0 }
};

State.getActiveWin = () => State.winStack.length > 0 ? State.winStack[State.winStack.length - 1] : null;

/**
 * [OS Kernel] - 自研硬件性能与内存调度中心
 */
const OS_Kernel = {
    ticks: 0,
    blackThresholdControl: () => {
        // CPU 优化：黑阈级后台冻结，仅为活跃窗口保留最高算力
        let active = State.getActiveWin();
        State.bgWins.forEach(id => { if(window.AppState[id]) window.AppState[id].frozen = true; });
        if(active && window.AppState[active]) window.AppState[active].frozen = false;
    },
    qingzhuoGC: () => {
        // 内存优化：每 300 帧执行一次幽灵内存清浊释放，防止系统卡顿
        if (OS_Kernel.ticks % 300 === 0) {
            let aliveIds = [...State.winStack, ...State.bgWins];
            for(let key in window.AppState) {
                if(!aliveIds.includes(key)) delete window.AppState[key];
            }
        }
    },
    cycle: () => {
        OS_Kernel.ticks++;
        OS_Kernel.blackThresholdControl();
        OS_Kernel.qingzhuoGC();
    }
};

/**
 * [Spatial Engine] - 智能空间避让
 */
const Spatial = {
    getSafePosition: (startX, startY, ignoreId) => {
        let ww = window.innerWidth || 300, wh = window.innerHeight || 500;
        let clamp = (v, min, max) => Math.max(min, Math.min(v, max));
        let x = clamp(startX, 10, ww - 70);
        let y = clamp(startY, 30, wh - 70);
        
        const isColliding = (cx, cy) => {
            return Layout.data.some(item => {
                if (item.id === ignoreId || item.x === undefined || item.y === undefined) return false;
                return Math.abs(cx - item.x) < 70 && Math.abs(cy - item.y) < 85;
            });
        };

        if (!isColliding(x, y)) return {x, y};
        
        let step = 15, maxRadius = Math.max(ww, wh);
        for (let r = step; r < maxRadius; r += step) {
            let points = Math.floor((2 * Math.PI * r) / step); 
            for (let i = 0; i < points; i++) {
                let angle = (i / points) * Math.PI * 2;
                let testX = clamp(x + r * Math.cos(angle), 10, ww - 70);
                let testY = clamp(y + r * Math.sin(angle), 30, wh - 70);
                if (!isColliding(testX, testY)) return {x: testX, y: testY};
            }
        }
        return {x, y}; 
    }
};

const Layout = {
    data: JSON.parse(localStorage.getItem('techos_layout')) || [
        {type:'app', id:'sys_store'}, {type:'app', id:'sys_imp'}
    ],
    save: () => localStorage.setItem('techos_layout', JSON.stringify(Layout.data)),
    sync: () => {
        let existingIds = new Set();
        let newData = [];

        Layout.data.forEach((item) => {
            if (item.type === 'folder' || item.type === 'perm_folder') {
                item.items = item.items.filter(id => VFS.isInstalled(id));
                if (item.items.length > 0 || item.type === 'perm_folder') {
                    item.items.forEach(id => existingIds.add(id));
                    newData.push(item);
                } else if (State.openFolder && State.openFolder.id === item.id) {
                    State.openFolder = null; 
                }
            } else if (item.type === 'app') {
                if (VFS.isInstalled(item.id) && !existingIds.has(item.id)) {
                    existingIds.add(item.id);
                    newData.push(item);
                }
            }
        });

        const allApps = [...Object.keys(SysApps), ...Object.keys(VFS.disk)];
        allApps.forEach(id => {
            if (!existingIds.has(id) && VFS.isInstalled(id)) {
                newData.push({type: 'app', id: id});
                existingIds.add(id);
            }
        });

        Layout.data = newData;
        Layout.data.forEach(item => {
            if (item.x === undefined || item.y === undefined) {
                let pos = Spatial.getSafePosition(20, 45, item.id);
                item.x = pos.x; item.y = pos.y;
            }
        });

        Layout.save();
    }
};
Layout.sync();

const UI = {
    ctx: null, w: 0, h: 0, btns: [], iconHitboxes: [],
    
    init: () => {
        const c = document.getElementById('os-surface'); UI.ctx = c.getContext('2d');
        UI.resize(); window.onresize = UI.resize;
        
        const getPt = (e) => { let t = e.touches ? e.touches[0] : e; return { x: t.clientX, y: t.clientY }; };
        
        c.onpointerdown = (e) => {
            e.preventDefault();
            let pt = getPt(e);

            if (State.contextMenu) {
                UI.hitTestButtons(pt.x, pt.y, true);
                State.contextMenu = null;
                return; 
            }

            State.drag.startX = pt.x; State.drag.startY = pt.y; State.drag.currX = pt.x; State.drag.currY = pt.y;
            
            let hit = null;
            if(!State.getActiveWin() && !UI.hitTestButtons(pt.x, pt.y, false)) {
                // 此时 iconHitboxes 已由渲染引擎做好严格过滤，不会出现透穿
                hit = UI.iconHitboxes.find(b => pt.x >= b.x && pt.x <= b.x+b.w && pt.y >= b.y && pt.y <= b.y+b.h);
                if(hit) { State.drag.item = hit.item; State.drag.active = false; }
            }

            if (!State.getActiveWin() && !State.openFolder) {
                State.longPressTimer = setTimeout(() => {
                    if (State.drag.active) return; 
                    if (hit && (hit.item.type === 'folder' || hit.item.type === 'perm_folder')) {
                        State.contextMenu = { x: pt.x, y: pt.y, target: hit.item };
                    } else if (!hit) {
                        State.contextMenu = { x: pt.x, y: pt.y, target: null };
                    }
                    State.drag.item = null; 
                }, 600);
            }
        };

        c.onpointermove = (e) => {
            if(State.drag.item) {
                let pt = getPt(e); State.drag.currX = pt.x; State.drag.currY = pt.y;
                if(Math.hypot(pt.x - State.drag.startX, pt.y - State.drag.startY) > 10) {
                    State.drag.active = true;
                    if(State.longPressTimer) clearTimeout(State.longPressTimer); 
                }
            }
        };

        c.onpointerup = (e) => {
            if(State.longPressTimer) clearTimeout(State.longPressTimer); 

            let now = Date.now();
            let pt = e.changedTouches ? {x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY} : {x: e.clientX, y: e.clientY};
            
            if(State.drag.active && State.drag.item) {
                UI.handleDrop(pt.x, pt.y, State.drag.item);
            } else if(State.drag.item) {
                if (now - State.lastClickTime > 300) {
                    if(State.drag.item.type === 'folder' || State.drag.item.type === 'perm_folder') State.openFolder = State.drag.item;
                    else UI.openApp(State.drag.item.id);
                    State.lastClickTime = now;
                }
            } else if (!State.contextMenu) {
                if (now - State.lastClickTime > 200) {
                    UI.hitTestButtons(pt.x, pt.y, true);
                    State.lastClickTime = now;
                }
            }
            State.drag.item = null; State.drag.active = false;
        };
        
        UI.loop();
    },

    resize: () => { 
        UI.w = window.innerWidth; UI.h = window.innerHeight; 
        if(UI.ctx) {
            UI.ctx.canvas.width = UI.w; UI.ctx.canvas.height = UI.h; 
            if (Layout.data) {
                let changed = false;
                Layout.data.forEach(item => {
                    if (item.x !== undefined) {
                        let nx = Math.max(10, Math.min(item.x, UI.w - 70));
                        let ny = Math.max(30, Math.min(item.y, UI.h - 70));
                        if (nx !== item.x || ny !== item.y) { item.x = nx; item.y = ny; changed = true; }
                    }
                });
                if(changed) Layout.save();
            }
        }
    },

    rect: (x,y,w,h,c,f=false) => { UI.ctx.strokeStyle=c; UI.ctx.fillStyle=c; f?UI.ctx.fillRect(x,y,w,h):UI.ctx.strokeRect(x,y,w,h); },
    text: (t,x,y,s=12,c='#00FF9C', align='left') => { UI.ctx.fillStyle=c; UI.ctx.font=`${s}px monospace`; UI.ctx.textAlign = align; UI.ctx.fillText(t,x,y); UI.ctx.textAlign = 'left'; },
    regBtn: (x,y,w,h,cb,txt) => { 
        UI.btns.push({x,y,w,h,cb}); 
        if(txt) { UI.rect(x,y,w,h,'#00FF9C',true); UI.text(txt, x+w/2, y+h/2+4, 12, '#000', 'center'); }
    },
    
    openApp: (id) => {
        State.bgWins = State.bgWins.filter(w => w !== id);
        State.winStack = State.winStack.filter(w => w !== id);
        State.winStack.push(id);
        State.openFolder = null; 
    },

    handleDrop: (x, y, draggedItem) => {
        let safeX = Math.max(10, Math.min(x - 30, UI.w - 70));
        let safeY = Math.max(30, Math.min(y - 30, UI.h - 70));

        // 隔离层：处理处于文件夹状态下的丢弃行为
        if (State.openFolder) {
            const fw = Math.min(UI.w*0.9, 400), fh = Math.min(UI.h*0.6, 400);
            const fx = (UI.w-fw)/2, fy = (UI.h-fh)/2;
            
            // 如果移出了文件夹面板区域，执行提取逻辑
            if (x < fx || x > fx+fw || y < fy || y > fy+fh) {
                if (!Layout.data.find(i => i.type === 'app' && i.id === draggedItem.id)) {
                    let pos = Spatial.getSafePosition(safeX, safeY, draggedItem.id);
                    Layout.data.push({type: 'app', id: draggedItem.id, x: pos.x, y: pos.y}); 
                }
                State.openFolder.items = State.openFolder.items.filter(i => i !== draggedItem.id);
                
                if(State.openFolder.items.length === 0 && State.openFolder.type !== 'perm_folder') { 
                    Layout.data = Layout.data.filter(i => i.id !== State.openFolder.id);
                    State.openFolder = null; 
                }
                Layout.sync();
            }
            // 【硬隔离修复】如果是在文件夹内部松手，强制中断，绝不执行底层合并逻辑
            return; 
        }

        if (draggedItem.type === 'folder' || draggedItem.type === 'perm_folder') {
            let pos = Spatial.getSafePosition(safeX, safeY, draggedItem.id);
            draggedItem.x = pos.x; draggedItem.y = pos.y;
            Layout.save();
            return;
        }

        // 常规桌面合并逻辑
        let hitTarget = UI.iconHitboxes.find(b => b.item !== draggedItem && x >= b.x && x <= b.x+b.w && y >= b.y && y <= b.y+b.h);
        if(hitTarget) {
            if(hitTarget.item.type === 'folder' || hitTarget.item.type === 'perm_folder') {
                if (!hitTarget.item.items.includes(draggedItem.id)) hitTarget.item.items.push(draggedItem.id);
                Layout.data = Layout.data.filter(i => !(i.type === 'app' && i.id === draggedItem.id));
            } else if(hitTarget.item.type === 'app') {
                let newFolder = { type: 'folder', id: 'f_'+Date.now(), name: "新建文件夹", items: [hitTarget.item.id, draggedItem.id], x: hitTarget.item.x, y: hitTarget.item.y };
                let idx = Layout.data.findIndex(i => i === hitTarget.item);
                if(idx > -1) {
                    Layout.data[idx] = newFolder;
                    Layout.data = Layout.data.filter(i => !(i.type === 'app' && i.id === draggedItem.id));
                }
            }
        } else {
            let pos = Spatial.getSafePosition(safeX, safeY, draggedItem.id);
            draggedItem.x = pos.x; 
            draggedItem.y = pos.y;
        }
        Layout.sync();
    },

    hitTestButtons: (x, y, execute=false) => {
        for (let i = UI.btns.length - 1; i >= 0; i--) {
            let b = UI.btns[i];
            if (x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h) {
                if(execute) b.cb();
                return true;
            }
        }
        let activeWin = State.getActiveWin();
        if (activeWin && !State.contextMenu) {
            const ww = Math.min(UI.w * 0.9, 500), wh = Math.min(UI.h * 0.85, 700);
            const wx = (UI.w - ww) / 2, wy = (UI.h - wh) / 2;
            if (x >= wx && x <= wx + ww && y >= wy && y <= wy + wh) return true;
        }
        return false;
    },

    loop: () => {
        OS_Kernel.cycle(); // 触发内核时钟：调控 CPU 算力与内存

        UI.btns = []; UI.iconHitboxes = [];
        UI.ctx.clearRect(0,0,UI.w, UI.h);
        for(let i=0; i<UI.w; i+=40) UI.rect(i, 0, 1, UI.h, 'rgba(0,255,156,0.05)', true);
        
        UI.rect(0,0,UI.w,25,'#111',true); 
        UI.text(`TechOS 2.2.0 | Kernel Optimized`, 15, 17);

        const iconSize = 60;

        // 渲染底层桌面图标
        Layout.data.forEach((item) => {
            let cx = item.x, cy = item.y;
            if(State.drag.active && State.drag.item === item) return; 
            
            if(item.type === 'folder' || item.type === 'perm_folder') {
                let fColor = item.type === 'perm_folder' ? '#FFD700' : '#00FF9C'; 
                UI.rect(cx, cy, iconSize, iconSize, fColor);
                UI.rect(cx+4, cy+4, iconSize-8, iconSize-8, fColor);
                UI.text(item.type === 'perm_folder' ? "P-DIR" : "DIR", cx+iconSize/2, cy+iconSize/2+4, 12, fColor, 'center');
                UI.text(item.name, cx+iconSize/2, cy+iconSize+15, 10, fColor, 'center');
                UI.iconHitboxes.push({x: cx, y: cy, w: iconSize, h: iconSize, item: item});
            } else {
                let app = SysApps[item.id] || VFS.disk[item.id];
                if(app) {
                    UI.rect(cx, cy, iconSize, iconSize, '#00FF9C'); 
                    UI.text(app.icon, cx+iconSize/2, cy+iconSize/2+4, 14, '#00FF9C', 'center');
                    UI.text(app.name, cx+iconSize/2, cy+iconSize+15, 10, '#00FF9C', 'center');
                    UI.iconHitboxes.push({x: cx, y: cy, w: iconSize, h: iconSize, item: item});
                }
            }
        });

        // 【核心修复】Z轴隔离渲染
        if(State.openFolder && !State.getActiveWin()) {
            UI.iconHitboxes = []; // 物理切断：清空桌面图标判定区，彻底封杀交互穿透
            
            UI.rect(0, 0, UI.w, UI.h, 'rgba(0,0,0,0.85)', true);
            const fw = Math.min(UI.w*0.9, 400), fh = Math.min(UI.h*0.6, 400);
            const fx = (UI.w-fw)/2, fy = (UI.h-fh)/2;
            let fColor = State.openFolder.type === 'perm_folder' ? '#FFD700' : '#00FF9C';
            UI.rect(fx, fy, fw, fh, '#111', true); UI.rect(fx, fy, fw, fh, fColor);
            UI.text(State.openFolder.name + " (移出面板释放到桌面)", fx+15, fy+22, 12, fColor);
            UI.regBtn(fx+fw-30, fy+5, 25, 25, () => State.openFolder = null, "X");

            const padding = 20, colSpacing = iconSize + padding, rowSpacing = iconSize + 30;
            const fCols = Math.max(1, Math.floor((fw - padding) / colSpacing));
            State.openFolder.items.forEach((id, index) => {
                let app = SysApps[id] || VFS.disk[id];
                if(app) {
                    let cx = fx + padding + (index % fCols) * colSpacing;
                    let cy = fy + 45 + Math.floor(index / fCols) * rowSpacing;
                    let virtualItem = {type: 'app', id: id};
                    if(State.drag.active && State.drag.item && State.drag.item.id === id) return;

                    UI.rect(cx, cy, iconSize, iconSize, fColor); 
                    UI.text(app.icon, cx+iconSize/2, cy+iconSize/2+4, 14, fColor, 'center');
                    UI.text(app.name, cx+iconSize/2, cy+iconSize+15, 10, fColor, 'center');
                    // 只将处于当前隔离罩内的图标加入响应列队
                    UI.iconHitboxes.push({x: cx, y: cy, w: iconSize, h: iconSize, item: virtualItem});
                }
            });
        }

        // 渲染窗口系统
        let activeWin = State.getActiveWin();
        if (activeWin && !State.contextMenu) {
            UI.btns = []; // 屏蔽窗口下的按钮穿透
            const ww = Math.min(UI.w * 0.9, 500), wh = Math.min(UI.h * 0.85, 700);
            const wx = (UI.w - ww) / 2, wy = (UI.h - wh) / 2;
            
            UI.rect(wx, wy, ww, wh, '#000', true); 
            UI.rect(wx, wy, ww, wh, '#00FF9C');
            UI.rect(wx, wy, ww, 30, '#00FF9C', true); 
            
            UI.regBtn(wx+ww-55, wy+5, 22, 22, () => {
                let topWin = State.winStack.pop(); 
                if (topWin && !State.bgWins.includes(topWin)) State.bgWins.push(topWin); 
            }, "-");
            UI.regBtn(wx+ww-28, wy+5, 22, 22, () => {
                let topWin = State.winStack.pop(); delete window.AppState[topWin];
            }, "X"); 

            if (activeWin === 'sys_store') {
                UI.text("官方应用商店", wx+10, wy+20, 12, '#000');
                let ly = 0;
                for (let cid in CloudStore) {
                    let isIns = VFS.isInstalled(cid);
                    UI.text(CloudStore[cid].name, wx+15, wy+60+ly);
                    UI.regBtn(wx+ww-85, wy+45+ly, 70, 25, () => {
                        isIns ? VFS.removeApp(cid) : VFS.saveApp(cid, CloudStore[cid]);
                    }, isIns ? "卸载" : "安装");
                    ly += 40;
                }
            } else if (activeWin === 'sys_imp') {
                UI.text("IMP 高级导入终端", wx+10, wy+20, 12, '#000');
                
                // 【核心升级】 DOM Overlay 注入器，突破原生 API 拦截与截断
                UI.regBtn(wx+ww/2-80, wy+wh/2-20, 160, 40, () => {
                    let domMask = document.createElement('div');
                    domMask.style.cssText = "position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:9999;display:flex;flex-direction:column;justify-content:center;align-items:center;";
                    
                    let ta = document.createElement('textarea');
                    ta.placeholder = ">> IMP_TERMINAL_READY\n>> 在此粘贴海量 JSON / HTML / JS 代码...\n>> 系统将自动分析并挂载。";
                    ta.style.cssText = "width:85%;height:60%;background:#050505;color:#00FF9C;border:1px solid #00FF9C;padding:15px;font-family:monospace;font-size:13px;outline:none;resize:none;box-shadow: 0 0 20px rgba(0,255,156,0.2);";
                    
                    let ctrlBox = document.createElement('div');
                    ctrlBox.style.cssText = "margin-top:25px;display:flex;gap:20px;";
                    
                    let btnOk = document.createElement('button');
                    btnOk.innerText = "执行 VFS 写入";
                    btnOk.style.cssText = "padding:10px 25px;background:#00FF9C;color:#000;border:none;font-weight:bold;cursor:pointer;font-family:monospace;";
                    
                    let btnCancel = document.createElement('button');
                    btnCancel.innerText = "中断连接";
                    btnCancel.style.cssText = "padding:10px 25px;background:#333;color:#fff;border:none;cursor:pointer;font-family:monospace;";
                    
                    btnCancel.onclick = () => document.body.removeChild(domMask);
                    btnOk.onclick = () => {
                        let val = ta.value.trim();
                        if(val) {
                            try {
                                let jsonObj = JSON.parse(val);
                                VFS.saveApp(jsonObj.id, jsonObj);
                                alert("解析成功：标准 .tap 封包已录入 VFS");
                            } catch(e) {
                                // 【多语言自适应编译】
                                let newId = 'app_' + Date.now();
                                // 将特殊字符安全转义，防止破坏外层 eval 环境
                                let safeCode = val.replace(/\\/g, '\\\\').replace(/`/g, '\\`').replace(/\$/g, '\\$');
                                let autoApp = {
                                    id: newId, name: "AutoApp", icon: "DEV",
                                    logic: `
                                        UI.text("自托管代码沙盒运行中...", wx+15, wy+50, 12, '#00FF9C');
                                        if(!window.AppState['${newId}_init']) {
                                            window.AppState['${newId}_init'] = true;
                                            try { 
                                                let execContainer = new Function(\`${safeCode}\`);
                                                execContainer();
                                            } catch(err) { console.error("AutoApp Error:", err); }
                                        }
                                        UI.text("VFS 虚拟内存映射就绪", wx+15, wy+75, 12, '#555');
                                    `
                                };
                                VFS.saveApp(newId, autoApp);
                                alert("多语言编译成功：非标准代码已自动封装为 AutoApp 容器。");
                            }
                        }
                        document.body.removeChild(domMask);
                    };
                    
                    ctrlBox.appendChild(btnOk); ctrlBox.appendChild(btnCancel);
                    domMask.appendChild(ta); domMask.appendChild(ctrlBox);
                    document.body.appendChild(domMask);
                }, "开启全量代码注入通道");

            } else {
                let appData = CloudStore[activeWin] || VFS.disk[activeWin];
                if(appData) {
                    UI.text(appData.name, wx+10, wy+20, 12, '#000');
                    if(window.AppState[activeWin] && window.AppState[activeWin].frozen) {
                        UI.text("进程已处于黑阈级冻结...", wx+15, wy+60, 12, '#555');
                    } else {
                        try { eval(appData.logic); } catch(e) { UI.text("运行时崩溃: " + e.message, wx+15, wy+60); }
                    }
                }
            }
        }

        // 渲染浮动元素
        if(State.drag.active && State.drag.item) {
            UI.ctx.globalAlpha = 0.6;
            let dColor = State.drag.item.type === 'perm_folder' ? '#FFD700' : '#00FF9C';
            UI.rect(State.drag.currX-30, State.drag.currY-30, iconSize, iconSize, dColor);
            UI.text("MOV", State.drag.currX, State.drag.currY+4, 12, dColor, 'center');
            UI.ctx.globalAlpha = 1.0;
        }

        if (State.contextMenu) {
            let mx = State.contextMenu.x, my = State.contextMenu.y;
            if (mx + 120 > UI.w) mx = UI.w - 120; 
            if (my + 80 > UI.h) my = UI.h - 80;

            UI.rect(mx, my, 120, 70, '#000', true);
            UI.rect(mx, my, 120, 70, '#00FF9C');

            if (!State.contextMenu.target) {
                UI.regBtn(mx+5, my+5, 110, 25, () => {
                    Layout.sync(); State.contextMenu = null;
                }, "刷新系统");
                UI.regBtn(mx+5, my+35, 110, 25, () => {
                    let pos = Spatial.getSafePosition(mx, my, null); 
                    Layout.data.push({
                        type: 'perm_folder', id: 'pf_' + Date.now(),
                        name: "永久文件夹", items: [], x: pos.x, y: pos.y
                    });
                    Layout.save(); State.contextMenu = null;
                }, "新建永久夹");
            } else if (State.contextMenu.target.type.includes('folder')) {
                UI.regBtn(mx+5, my+5, 110, 30, () => {
                    let folder = State.contextMenu.target;
                    folder.items.forEach(appId => {
                        if (!appId.startsWith('sys_')) VFS.removeApp(appId);
                    });
                    Layout.data = Layout.data.filter(i => i.id !== folder.id);
                    State.contextMenu = null;
                    Layout.sync();
                }, "强力删除");
            }
        }

        requestAnimationFrame(UI.loop);
    }
};
UI.init();
</script>
</body>
</html>
