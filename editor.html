<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML编辑器 (优化显示版)</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: sans-serif;
}

body {
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: #1e1e1e;
}

header {
    background: #111;
    color: white;
    padding: 10px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    border-bottom: 1px solid #333;
}

button {
    padding: 8px 15px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    background: #333;
    color: #eee;
    transition: 0.2s;
}

button:hover {
    background: #444;
}

.editor {
    flex: 1;
    display: flex;
    overflow: hidden; /* 防止溢出 */
}

/* 调整区域比例：编辑器占35%，预览占65% */
#code {
    width: 35%;
    height: 100%;
    resize: none;
    outline: none;
    border: none;
    padding: 15px;
    font-size: 14px;
    background: #252526;
    color: #d4d4d4;
    border-right: 1px solid #333;
}

#preview {
    width: 65%;
    height: 100%;
    border: none;
    background: white;
}

@media(max-width: 700px) {
    .editor {
        flex-direction: column;
    }
    #code, #preview {
        width: 100%;
        height: 50%;
    }
}
</style>
</head>

<body>

<header>
    <button onclick="run()">▶ 运行</button>
    <button onclick="downloadHTML()">💾 导出</button>
    <button onclick="newProject()">🗑 新建</button>
    <button onclick="template()">📄 模板</button>
    <button onclick="fullscreenEditor()">⛶ 全屏编辑</button>
</header>

<div class="editor">
    <textarea id="code" spellcheck="false">
<!DOCTYPE html>
<html>
<head>
<title>我的网站</title>
</head>
<body>

<h1>Hello World</h1>
<p>欢迎使用HTML编辑器</p>

</body>
</html>
    </textarea>
    <iframe id="preview"></iframe>
</div>

<script>
    const code = document.getElementById("code");
    const preview = document.getElementById("preview");

    function run(){
        preview.srcdoc = code.value;
    }

    function downloadHTML(){
        const blob = new Blob([code.value], {type:"text/html"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "index.html";
        a.click();
    }

    function newProject(){
        if(confirm("确定清空编辑器吗？")){
            code.value="";
            run();
        }
    }

    function template(){
        code.value = `<!DOCTYPE html>
<html>
<head>
<title>新项目</title>
<style>
    body{ font-family:sans-serif; padding:20px; }
    button{ padding:10px; cursor:pointer; }
</style>
</head>
<body>
    <h1>我的网站</h1>
    <p>开始制作吧！</p>
    <button onclick="alert('你好')">点击测试</button>
</body>
</html>`;
        run();
    }

    function fullscreenEditor(){
        const elem = document.documentElement;
        if (elem.requestFullscreen) {
            elem.requestFullscreen();
        }
    }

    code.addEventListener("input", run);
    run(); // 初始化运行
</script>

</body>
</html>
