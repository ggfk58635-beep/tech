<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML编辑器</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
height:100vh;
display:flex;
flex-direction:column;
background:#1e1e1e;
}

header{
background:#111;
color:white;
padding:10px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

button{
padding:8px 15px;
border:none;
border-radius:5px;
cursor:pointer;
}

.editor{
flex:1;
display:flex;
}

textarea{
width:50%;
height:100%;
resize:none;
outline:none;
border:none;
padding:10px;
font-size:16px;
background:#252526;
color:white;
}

iframe{
width:50%;
height:100%;
border:none;
background:white;
}

@media(max-width:700px){
.editor{
flex-direction:column;
}

textarea,
iframe{
width:100%;
height:50%;
}
}
</style>
</head>

<body>

<header>

<button onclick="run()">▶运行</button>

<button onclick="downloadHTML()">💾导出HTML</button>

<button onclick="newProject()">🗑新建</button>

<button onclick="template()">📄模板</button>

<button onclick="fullscreenEditor()">⛶全屏编辑</button>

</header>

<div class="editor">

<textarea id="code">
<!DOCTYPE html>
<html>
<head>
<title>我的网站</title>
</head>
<body>

<h1>Hello World</h1>

<p>欢迎使用HTML编辑器</p>

</body>
</html>
</textarea>

<iframe id="preview"></iframe>

</div>

<script>

const code =
document.getElementById("code");

const preview =
document.getElementById("preview");

function run(){

preview.srcdoc =
code.value;

}

function downloadHTML(){

const blob =
new Blob(
[code.value],
{type:"text/html"}
);

const a =
document.createElement("a");

a.href =
URL.createObjectURL(blob);

a.download =
"index.html";

a.click();

}

function newProject(){

if(confirm("确定清空吗？")){

code.value="";

run();

}

}

function template(){

code.value =
`<!DOCTYPE html>
<html>
<head>
<title>新项目</title>

<style>

body{
font-family:sans-serif;
padding:20px;
}

button{
padding:10px;
}

</style>

</head>
<body>

<h1>我的网站</h1>

<p>开始制作吧！</p>

<button onclick="alert('你好')">
点击
</button>

</body>
</html>`;

run();

}

function fullscreenEditor(){

if(code.requestFullscreen){

code.requestFullscreen();

}

}

code.addEventListener(
"input",
run
);

run();

</script>

</body>
</html>
