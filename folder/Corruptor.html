<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Interface - Key Edition</title>
    <style>
        body { background: #000; color: #fff; font-family: monospace; padding: 10px; margin: 0; }
        .page { display: none; }
        .active { display: block; }
        .app { width: 100%; max-width: 600px; margin: auto; }
        .menu-btn { display: block; width: 100%; padding: 20px; margin: 10px 0; background: #222; border: 1px solid #444; color: #fff; cursor: pointer; text-align: center; font-weight: bold; }
        .audio-ctrl { margin-top: 20px; border-top: 1px solid #333; padding-top: 10px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        select { background: #222; color: #fff; border: 1px solid #444; padding: 5px; cursor: pointer; }
        textarea { width: 100%; height: 100px; background: #111; color: #fff; border: 1px solid #333; padding: 10px; box-sizing: border-box; font-size: 14px; border-radius: 4px; }
        .btn-group { display: flex; gap: 5px; margin-top: 10px; flex-wrap: wrap; }
        button { flex: 1; padding: 12px; cursor: pointer; border: none; font-weight: bold; border-radius: 4px; font-size: 13px; background: #444; color: white; }
        #corruptBtn { background: #ff4500; }
        #keyBtn { background: #8800ff; }
        #exportBtn { background: #0088cc; }
        #outputArea { margin-top: 10px; width: 100%; height: 200px; background: #050505; color: #ff2233; border: 1px solid #444; padding: 10px; font-size: 14px; word-break: break-all; resize: vertical; }
        .status { color: #ffaa00; font-size: 12px; margin: 5px 0; }
    </style>
</head>
<body>

<div id="mainMenu" class="page active">
    <h1>SYSTEM MENU</h1>
    <button class="menu-btn" onclick="showPage('glitchTool')">ENTER GLITCHER</button>
    <div class="audio-ctrl">
        <h3>BGM CONTROL</h3>
        <input type="file" id="audioInput" accept="audio/*">
        <div style="display: flex; gap: 5px; margin-top: 10px;">
            <button onclick="playAudio()">Play</button>
            <button onclick="pauseAudio()">Stop</button>
        </div>
        <p id="audioStatus">Status: Stopped</p>
    </div>
</div>

<div id="glitchTool" class="page">
    <button onclick="showPage('mainMenu')">BACK TO MENU</button>
    <div class="header">
        <h3 id="ui-title">故障工具</h3>
        <select id="langSelect">
            <option value="cn">简体中文</option>
            <option value="en">English</option>
        </select>
    </div>
    <textarea id="inputBox" placeholder="输入内容..."></textarea>
    <div style="margin: 10px 0;">
        <label id="ui-intensity">损坏程度: </label><span id="val">0</span>
        <input type="range" id="intensity" min="0" max="500" value="0" style="width:100%" oninput="document.getElementById('val').innerText = this.value">
    </div>
    <div class="btn-group">
        <button id="corruptBtn">损坏 (执行)</button>
        <button id="keyBtn">生成假密钥</button>
        <button id="copyBtn">全选/复制</button>
        <button id="exportBtn">导出 .txt</button>
        <button id="resetBtn">重置</button>
    </div>
    <textarea id="outputArea" readonly></textarea>
    <div class="status" id="statusInfo">准备就绪 | Count: 0</div>
</div>

<script>
    // 资产
    const ERROR_SYMBOLS = ["⚠", "✘", "☹", "█", "CRITICAL", "FAIL"];
    const DIACRITICS = ["\u030d", "\u030e", "\u0304", "\u0305", "\u033f", "\u0311"];
    let masterBuffer = "";

    // 页面逻辑
    function showPage(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    function updateUI() { document.getElementById('outputArea').value = masterBuffer; document.getElementById('statusInfo').innerText = `Count: ${masterBuffer.length}`; }

    // 核心损坏逻辑
    function corruptString(str) {
        let result = "";
        const intensity = parseInt(document.getElementById('intensity').value);
        for(let char of str) {
            if (Math.random() * 500 < intensity) {
                result += (Math.random() > 0.5 ? ERROR_SYMBOLS[Math.floor(Math.random()*ERROR_SYMBOLS.length)] : DIACRITICS[Math.floor(Math.random()*DIACRITICS.length)]);
            } else {
                result += char;
            }
        }
        return result;
    }

    // --- 新增：固定格式密钥生成逻辑 ---
    function generateKey() {
        const chars = "ABCDEF0123456789";
        // 格式: 4XXXX-XXXX-XXXX-IDXX
        let key = "4";
        for(let i=0; i<4; i++) key += chars[Math.floor(Math.random()*chars.length)];
        key += "-";
        for(let i=0; i<4; i++) key += chars[Math.floor(Math.random()*chars.length)];
        key += "-";
        for(let i=0; i<4; i++) key += chars[Math.floor(Math.random()*chars.length)];
        key += "-ID";
        key += Math.floor(Math.random()*90 + 10);
        
        // 关键：将密钥进行局部乱码污染，但保留格式
        let pollutedKey = "";
        for(let char of key) {
            if(Math.random() < 0.2) { // 20% 概率乱码
                pollutedKey += ERROR_SYMBOLS[Math.floor(Math.random()*ERROR_SYMBOLS.length)];
            } else {
                pollutedKey += char;
            }
        }
        masterBuffer = pollutedKey;
        updateUI();
    }

    // 按钮绑定
    document.getElementById('corruptBtn').onclick = () => { masterBuffer = corruptString(masterBuffer || document.getElementById('inputBox').value); updateUI(); };
    document.getElementById('keyBtn').onclick = generateKey;
    
    // 强制复制功能
    document.getElementById('copyBtn').onclick = () => {
        const area = document.createElement("textarea");
        area.value = masterBuffer;
        document.body.appendChild(area);
        area.select();
        document.execCommand("copy");
        document.body.removeChild(area);
        alert("完整数据已进入剪贴板！");
    };

    // 其他逻辑 (音乐/导出)
    const audio = new Audio();
    audio.loop = true;
    function playAudio() {
        if (!audio.src && document.getElementById('audioInput').files[0]) audio.src = URL.createObjectURL(document.getElementById('audioInput').files[0]);
        audio.play();
    }
    function pauseAudio() { audio.pause(); }
    document.getElementById('exportBtn').onclick = () => {
        const blob = new Blob([masterBuffer], { type: "text/plain" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "KEY_" + Date.now() + ".txt";
        a.click();
    };
    document.getElementById('resetBtn').onclick = () => { masterBuffer = ""; updateUI(); };
</script>
</body>
</html>
